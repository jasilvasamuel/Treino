<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste JS</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #111; color: #eee; }
h2 { color: #d4a373; }
.btn { display: block; width: 100%; padding: 14px; margin: 8px 0;
       background: #1a1f2e; border: 1px solid #d4a373; border-radius: 8px;
       color: #eee; font-size: 15px; cursor: pointer; text-align: left; }
.btn.ok { background: #10b981; color: #000; border-color: #10b981; }
#log { margin-top: 20px; background: #000; padding: 12px; border-radius: 8px;
       font-family: monospace; font-size: 12px; color: #0f0; white-space: pre-wrap;
       min-height: 80px; }
#img-area { width: 100%; min-height: 80px; background: #222; border: 2px dashed #555;
            border-radius: 8px; margin: 10px 0; display: flex; align-items: center;
            justify-content: center; overflow: hidden; }
#img-area img { max-width: 100%; max-height: 200px; }
label.upload { display: inline-block; padding: 10px 16px; background: #d4a373;
               color: #111; border-radius: 8px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<h2>Teste de JavaScript</h2>
<p style="color:#aaa;font-size:13px">Toque em cada botao e veja o resultado no log.</p>

<button class="btn" id="btn1">1. Testar JS basico</button>
<button class="btn" id="btn2">2. Testar localStorage</button>
<button class="btn" id="btn3">3. Testar querySelector</button>

<label class="upload">
  4. Testar upload de imagem
  <input type="file" id="file-inp" accept="image/*" style="display:none">
</label>

<div id="img-area"><span style="color:#666">Imagem aparece aqui</span></div>

<div id="log">Aguardando...</div>

<script src="teste.js"></script>
</body>
</html>
